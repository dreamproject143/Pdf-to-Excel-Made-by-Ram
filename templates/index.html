<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel Converter | Made by Ram</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="container">
        <h1>PDF to Excel Converter <span class="author">(Made by Ram)</span></h1>
        <p class="subtitle">Extract Data from PDFs to Excel</p>
        
        <form id="uploadForm" enctype="multipart/form-data">
            <div id="drop-area">
                <input type="file" name="files" id="fileInput" multiple accept=".pdf" hidden>
                <div class="upload-icon">📂</div>
                <p>Drag & Drop PDF files here<br>or <strong>click to select</strong></p>
            </div>
            
            <span id="fileLabel">No files chosen</span>
            
            <button type="button" id="generateBtn" onclick="uploadAndProcess()">📊 Generate Excel Report</button>
        </form>
        
        <p id="message"></p>
    </div>

    <p class="thank-you">Thank you for giving chance, Mr. Bryan</p>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const dropArea = document.getElementById('drop-area');
        const generateBtn = document.getElementById('generateBtn');

        // Update text when files are picked
        function updateFileLabel() {
            const numFiles = fileInput.files.length;
            if (numFiles > 0) {
                fileLabel.innerText = `${numFiles} PDF file(s) selected`;
                generateBtn.disabled = false;
            } else {
                fileLabel.innerText = "No files chosen";
                generateBtn.disabled = true;
            }
        }
        
        // Open file selector when clicking the box
        dropArea.addEventListener('click', () => { fileInput.click(); });
        fileInput.addEventListener('change', updateFileLabel);

        // Stop browser from opening the PDF file when dropping
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        // Light up the box when dragging over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('drag-over'), false);
        });

        // Handle dropped files
        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            let dt = e.dataTransfer;
            let files = dt.files;
            fileInput.files = files;
            updateFileLabel();
        }
        
        // This function does everything in one go
        function uploadAndProcess() {
            const formData = new FormData();
            const files = fileInput.files;
            
            if (files.length === 0) {
                document.getElementById('message').innerText = 'Please select PDF files first';
                document.getElementById('message').style.color = '#ff5252';
                return;
            }

            for (let i = 0; i < files.length; i++) {
                if (files[i].type !== 'application/pdf') {
                    document.getElementById('message').innerText = 'Please upload only PDF files';
                    document.getElementById('message').style.color = '#ff5252';
                    return;
                }
                formData.append('files', files[i]);
            }

            document.getElementById('message').innerText = 'Uploading and processing files...';
            document.getElementById('message').style.color = '#4CAF50';
            generateBtn.disabled = true;
            generateBtn.innerText = '⏳ Processing...';

            // Step 1: Upload the files
            fetch('/upload', { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    throw new Error(data.message || 'Error uploading files');
                }
                // Step 2: Automatically generate and download the file
                return fetch('/process', { method: 'POST' });
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Error generating Excel file');
                }
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'PDF_Extracted_Data.xlsx';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                document.getElementById('message').innerText = 'Excel file downloaded successfully!';
                document.getElementById('message').style.color = '#4CAF50';
            })
            .catch(error => {
                document.getElementById('message').innerText = error.message;
                document.getElementById('message').style.color = '#ff5252';
                console.error('Error:', error);
            })
            .finally(() => {
                generateBtn.disabled = false;
                generateBtn.innerText = '📊 Generate Excel Report';
            });
        }

        // Run on page load
        updateFileLabel();
    </script>
</body>
</html>
